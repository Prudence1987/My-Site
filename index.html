<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tourism Website</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#fff;
      color:#222;
    }

    header{
      height:80vh;
      background:url('photo.jpg') center/cover no-repeat;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      text-align:center;
      position:relative;
    }

    header::before{
      content:"";
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.5);
    }

    .hero{
      position:relative;
      z-index:1;
    }

    h1{
      font-size:45px;
    }

    section{
      padding:50px 20px;
      text-align:center;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:15px;
      max-width:900px;
      margin:auto;
    }

    .gallery img{
      width:100%;
      border-radius:10px;
    }

    footer{
      background:#111;
      color:white;
      text-align:center;
      padding:15px;
      margin-top:40px;
    }
  </style>
</head>

<body>

<header>
  <div class="hero">
    <h1>Discover Amazing Places</h1>
    <p>Travel • Nature • Experience</p>
  </div>
</header>

<section>
  <h2>Gallery</h2>

  <div class="gallery">
    <img src="photo.jpg">
    <!-- afaka manampy photo2.jpg, photo3.jpg -->
  </div>
</section>

<footer>
  <p>© 2026 Travel Website</p>
</footer>

</body>
</html>
