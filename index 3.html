<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Madagascar Paradise Tours</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f4f4f4;
      color:#333;
    }

    header{
      background:url('photo.jpg') center/cover;
      height:100vh;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .hero{
      background:rgba(0,0,0,0.5);
      padding:30px;
      border-radius:10px;
    }

    h1{
      font-size:50px;
      margin-bottom:10px;
    }

    p{
      font-size:20px;
    }

    .btn{
      display:inline-block;
      margin-top:20px;
      padding:12px 25px;
      background:#00a884;
      color:white;
      text-decoration:none;
      border-radius:5px;
      font-size:18px;
    }

    section{
      padding:50px 20px;
      text-align:center;
    }

    .gallery img{
      width:300px;
      margin:10px;
      border-radius:10px;
    }

    footer{
      background:#111;
      color:white;
      text-align:center;
      padding:20px;
    }
  </style>
</head>

<body>

<header>
  <div class="hero">
    <h1>Explore Madagascar</h1>
    <p>Discover Paradise Landscapes & Amazing Tours</p>

    <a class="btn"
       href="https://wa.me/261XXXXXXXXX">
       Book Now
    </a>
  </div>
</header>

<section>
  <h2>Beautiful Destinations</h2>

  <div class="gallery">
    <img src="photo.jpg">
  </div>
</section>

<footer>
  <p>© 2026 Madagascar Paradise Tours</p>
</footer>

</body>
</html>
