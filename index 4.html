<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f4f4f4;
      color:#333;
    }

    header{
      height:100vh;
      background:#222;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .box{
      padding:20px;
    }

    h1{
      font-size:40px;
    }

    p{
      font-size:18px;
      opacity:0.8;
    }

    .btn{
      display:inline-block;
      margin-top:20px;
      padding:12px 20px;
      background:#00a884;
      color:white;
      text-decoration:none;
      border-radius:5px;
    }

    section{
      padding:40px;
      text-align:center;
    }

    img{
      width:300px;
      border-radius:10px;
      margin-top:10px;
    }

    footer{
      background:#111;
      color:white;
      text-align:center;
      padding:15px;
    }
  </style>
</head>

<body>

<header>
  <div class="box">
    <h1>Welcome</h1>
    <p>My personal website</p>

    <a class="btn" href="https://wa.me/261XXXXXXXXX">
      Contact Me
    </a>
  </div>
</header>

<section>
  <h2>Gallery</h2>
  <img src="photo.jpg">
</section>

<footer>
  <p>© 2026 My Website</p>
</footer>

</body>
</html>
