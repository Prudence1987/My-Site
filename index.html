<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tsara Dia Tours</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      scroll-behavior: smooth;
    }

    /* HEADER */
    header {
      background: linear-gradient(90deg, #0077b6, #00b4d8);
      color: white;
      text-align: center;
      padding: 15px;
    }

    .logo img {
      width: 90px;
      animation: fadeIn 2s ease-in-out;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: scale(0.8);}
      to {opacity: 1; transform: scale(1);}
    }

    header h1 {
      margin: 5px 0;
      font-size: 22px;
    }

    /* MENU */
    nav {
      background: #023e8a;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    nav a {
      color: white;
      padding: 12px 18px;
      text-decoration: none;
    }

    nav a:hover {
      background: #0096c7;
    }

    /* HERO SECTION */
    .hero {
      height: 60vh;
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
      url('images/bg.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .hero h2 {
      font-size: 28px;
      background: rgba(0,0,0,0.4);
      padding: 10px;
      border-radius: 10px;
    }

    /* SECTIONS */
    section {
      padding: 40px 20px;
      text-align: center;
    }

    /* GALLERY */
    .gallery-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      padding: 20px;
    }

    .gallery-container img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
      transition: 0.3s;
    }

    .gallery-container img:hover {
      transform: scale(1.05);
    }

    /* WHATSAPP BUTTON */
    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      header h1 {
        font-size: 18px;
      }

      .hero h2 {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <img src="images/logo.png" alt="Tsara Dia Tours Logo">
    </div>
    <h1>Tsara Dia Tours</h1>
  </header>

  <!-- MENU -->
  <nav>
    <a href="#home">Home</a>
    <a href="#tours">Tours</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- HERO -->
  <div class="hero" id="home">
    <h2>Explore Madagascar with Us 🌍</h2>
  </div>

  <!-- TOURS -->
  <section id="tours">
    <h2>Tours</h2>
    <p>We offer trips, beaches, nature and adventure experiences across Madagascar 🇲🇬</p>
  </section>

  <!-- GALLERY -->
  <section id="gallery">
    <h2>Gallery</h2>

    <div class="gallery-container">
      <img src="images/img1.JPG">
      <img src="images/img2.JPG">
      <img src="images/img3.JPG">
      <img src="images/img4.JPG">
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h2>Contact</h2>
    <p>Contact us via WhatsApp or phone for booking.</p>
  </section>

  <!-- WHATSAPP BUTTON -->
  <a class="whatsapp" href="https://wa.me/261XXXXXXXX" target="_blank">
    WhatsApp
  </a>

</body>
</html>
